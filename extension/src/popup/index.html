<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibesfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: linear-gradient(160deg, hsl(270 40% 92%) 0%, hsl(20 50% 93%) 50%, hsl(220 20% 94%) 100%);
        -webkit-font-smoothing: antialiased;
      }
      .font-heading { font-family: 'DM Serif Display', serif !important; }
      .card-glass {
        background: hsla(0, 0%, 100%, 0.72);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid hsla(0, 0%, 100%, 0.6);
        box-shadow: 0 2px 24px -4px hsla(240, 10%, 10%, 0.06);
        border-radius: 1rem;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
